<!DOCTYPE html>
<html>
<head>
    <title>Server Monitoring</title>
</head>
<body>
    <h1>Server Monitoring Dashboard</h1>

    <h2>CPU Usage</h2>
    <p id="cpu"></p>

    <h2>Memory Usage</h2>
    <p id="memory"></p>

    <script>
        setInterval(() => {
            fetch('/cpu').then(res => res.text()).then(data => {
                document.getElementById('cpu').innerText = data;
            });

            fetch('/memory').then(res => res.text()).then(data => {
                document.getElementById('memory').innerText = data;
            });
        }, 2000);
    </script>
</body>
</html>
